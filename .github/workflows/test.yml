name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev, elasticsearch]"

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short
          # Default pytest config excludes elasticsearch, llm, and integration tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev,elasticsearch]"

      - name: Start Services
        run: |
          # Use --build to ensure harmony-api reflects latest changes
          # Use --wait to let docker-compose handle dependency healthchecks
          docker compose -f docker-compose.test.yml up -d --build --wait --wait-timeout 180
          # Give pipelines extra time to start (no healthcheck due to auth requirements)
          sleep 10

      - name: Verify Services are running
        run: |
          curl -f http://localhost:9200/_cluster/health || exit 1
          curl -f http://localhost:8000/docs || exit 1
          # Pipelines endpoints require authentication, skip verification

      - name: Run Integration tests
        run: |
          # Run both elasticsearch and integration tests
          pytest tests/ -v --tb=short -m "elasticsearch or integration"

      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v

  linting:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: |
          ruff check --output-format=github .

      - name: Run ruff format check
        run: |
          ruff format --check .
