name: Pre-commit CI Lite

on:
  push:
    branches: [ master, main ]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  pre-commit-ci-lite:
    # Only run on labeled trigger or standard triggers
    if: "github.event.action != 'labeled' || github.event.label.name == 'pre-commit ci run'"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Remove label if present
      if: github.event.action == 'labeled' && github.event.label.name == 'pre-commit ci run'
      run: gh pr edit ${{ github.event.number }} --remove-label 'pre-commit ci run'
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 26
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies (Backend)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Install dependencies (Frontend)
      run: |
        cd frontend
        npm ci

    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1

    - name: Pre-commit CI Lite Auto-fix
      uses: pre-commit-ci/lite-action@v1.1.0
      if: always()

  backend-linting:
    name: Backend Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff check
        run: ruff check --output-format=github .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run mypy
        run: mypy --config-file pyproject.toml harmony/

  frontend-linting:
    name: Frontend Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run tsc
        run: |
          cd frontend
          npx tsc --noEmit
