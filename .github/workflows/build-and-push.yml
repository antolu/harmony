name: Build and Push Images

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

env:
  REGISTRY: docker.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for setuptools-scm to detect version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_TAG="${RAW_TAG#v}"
          echo "raw_tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate package version tag
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import sys

          try:
            from packaging.version import InvalidVersion, Version
          except Exception:
            print("packaging is required on the runner but is not available.")
            sys.exit(1)

          version_tag = os.environ["VERSION_TAG"]
          try:
            Version(version_tag)
          except InvalidVersion:
            print(f"Invalid PEP 440 version for build: {version_tag}")
            print("Use tags like v1.2.3, v1.2.3rc1, or v1.2.3.dev1")
            sys.exit(1)
          PY
        env:
          VERSION_TAG: ${{ steps.vars.outputs.version_tag }}

      - name: Build and push API image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_TYPE=production
          tags: |
            antonlu/harmony-api:latest
            antonlu/harmony-api:${{ steps.vars.outputs.version_tag }}

      - name: Build and push Frontend image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_TYPE=production
          tags: |
            antonlu/harmony-frontend:latest
            antonlu/harmony-frontend:${{ steps.vars.outputs.version_tag }}

      - name: Summary
        run: |
          echo "## Images Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Source git tag: ${{ steps.vars.outputs.raw_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Published image tag: ${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/harmony-api:latest" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/harmony-api:${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/harmony-frontend:latest" >> $GITHUB_STEP_SUMMARY
          echo "antonlu/harmony-frontend:${{ steps.vars.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
