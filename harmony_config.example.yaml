# Harmony Crawler Configuration Example

crawler:
  # Starting URLs for the crawl
  start_urls:
    - "https://nxcals-docs.web.cern.ch/current"
    - "https://acc-py.docs.cern.ch"
    - https://beams.cern
    - https:///home.cern
    - "https://admin-eguide.web.cern.ch"

  # Proxy configuration (optional)
  # proxy:
  #   # Proxy URL (scheme determines type: http://, https://, socks4://, socks5://)
  #   url: http://proxy.example.com:8080
  #   # Authentication (optional)
  #   username: myuser
  #   password: mypass
  #   # Example SOCKS5 proxy:
  #   # url: socks5://127.0.0.1:1080

  # Domain-to-spider routing
  domain_routing:
    # Exact domain matches (highest priority)
    exact:
      "nxcals-docs.web.cern.ch": docs
      "admin-eguide.web.cern.ch": drupal
      "beams.cern": drupal
      "home.cern": drupal
      "confluence.cern.ch": generic

    # Pattern-based matches (checked in order after exact matches)
    patterns:
      - pattern: ".*-docs\\.web\\.cern\\.ch"
        spider: docs
      - pattern: ".*\\.docs\\.cern\\.ch"
        spider: docs
      - pattern: ".*wiki.*"
        spider: generic
      - pattern: ".*\\.cern$"
        spider: drupal

    # Default spider for domains that don't match any rules
    default: generic

  # Spider-specific settings
  spider_settings:
    # Documentation spider settings
    docs:
      skip_versions: true
      version_allowlist:
        - stable
        - latest
        - current
        - main
        - master
        - dev
        - beta
        - nightly
