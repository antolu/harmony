# Harmony Crawler Configuration Example

crawler:
  # Starting URLs for the crawl
  start_urls:
    - "https://nxcals-docs.web.cern.ch/current"
    - "https://acc-py.docs.cern.ch"
    - "https://acc-py.web.cern.ch"
    # - "https://beams.cern"
    # - "https://home.cern"
    - "https://admin-eguide.web.cern.ch"
    - "https://guides.web.cern.ch"

  autothrottle_start_delay: 0.05
  autothrottle_max_delay: 0.5

  # Basic settings
  max_depth: 20       # Maximum crawl depth
  output: output       # Output directory for data
  verbose: 0           # Log verbosity: 0=INFO, 1+=DEBUG

  # Performance settings
  # Speed up crawling by reducing delay and increasing concurrency
  delay: 0.1          # Request delay in seconds (default: 1.0)
  concurrent: 12       # Max concurrent requests (default: 5)
  download_timeout: 10

  # Limit domains (optional - otherwise auto-inferred from start_urls)
  allowed_domains:
    - "nxcals-docs\\.web\\.cern\\.ch"
    - "acc-py\\.docs\\.cern\\.ch"
    - "acc-py\\.web\\.cern\\.ch"
    - "admin-eguide\\.web\\.cern\\.ch"
    - "guides\\.web\\.cern\\.ch"
    - "cds\\.cern\\.ch"

  # Exclude specific domains even if they match allowed_domains
  forbidden_domains:
    - ".*edh\\.cern\\.ch/.+"  # block edh forms
    - ".*phonebook\\.cern\\.ch/.+"  # block phonebook users.

  # Proxy configuration (optional)
  # proxy:
  #   url: http://localhost:8080
    # username: myuser  # Optional
    # password: mypass  # Optional

  # State management (optional - enables stateful crawling)
  es_state_host: http://localhost:9200
  es_state_index: harmony-crawl-state

  # Pause/resume support
  jobdir: .crawl-state

  # Re-crawling mode
  # recrawl_mode: full  # or "age-based"
  # max_age_days: 7

  # Deletion management
  delete_missing: false
  missing_threshold: 3

  # Safety configuration (optional)
  # safe_mode: false       # Set true for extra strict checks
  # dry_run: false         # Set true to test without making requests
  # allow_mutations: false # Set true to reduce safety (USE CAUTION)
  # ignore_robots: false   # Set true to ignore robots.txt
  interactive_safety: true # Set true to enable prompts

  # Custom safety lists
  # safety_allow_list:
  #   - "example\\.com/admin/view.*"
  # safety_deny_list:
  #   - "/private/.*"
  # safety_lists_file: .harmony-safety-lists.json

  # URL scope filtering (not safety, just filtering unwanted content)
  link_extractor_deny:
    - "/search\\?"      # Skip (CDS) search result pages
    - "[?&]ln=(?!en)"   # Skip non-English CDS variants

  # Authentication configuration
  auth:
    # Session storage path
    session_storage_path: .harmony-auth-sessions

    # Retry settings
    max_auth_retries: 3
    retry_on_auth_failure: true

    # Auto-authentication on 403 (enabled by default)
    auto_authenticate_on_403: true

    # Authentication providers
    providers:
      # Example 1: Static Cookie (simplest)
      # - type: static_cookie
      #   domains:
      #     - "protected\\.example\\.com"
      #   cookies:
      #     session_id: "abc123xyz"

      # Example 2: Basic Auth
      # - type: basic
      #   domains:
      #     - "api\\.example\\.com"
      #   username: "myuser"
      #   password: "mypassword"

      # Example 3: Bearer Token
      # - type: bearer
      #   domains:
      #     - "api\\.example\\.com/v2/.*"
      #   token: "eyJhbGciOiJIUzI1..."

      # Example 4: Service Account (OAuth2)
      # - type: service_account
      #   domains: ["api\\.example\\.com"]
      #   token_url: "https://auth.example.com/oauth/token"
      #   client_id: "client_id"
      #   client_secret: "client_secret"

      # CERN SSO (Simulated via Playwright)
      - type: playwright_sso
        name: "cern-sso"
        domains:
          - ".*\\.cern\\.ch"
          - ".*\\.cern"
        # login_url: "https://auth.cern.ch/..." # Optional override
        storage_state_file: ".cern-sso-state.json"

        # Auth domain patterns (used for redirect detection)
        # These substrings trigger auth detection when found in URLs
        auth_domain_patterns:
          - "auth.cern.ch"
          - "login.cern.ch"
          - "keycloak"

        # Detection markers (defaults work for most sites)
        # Authenticated markers: if any match, user is logged in
        # authenticated_markers:
        #   - "text=Sign out"
        #   - "text=Log out"
        #   - "a[href*='logout']"
        #   - ".user-profile"

        # Login required markers: if any match, login form is present
        # login_required_markers:
        #   - "input[type='password']"
        #   - "text=Sign in"
        #   - "text=Log in"

        # Performance tuning for auth
        headless: false       # Set true for headless login (if 2FA not required)
        timeout_seconds: 300

        # User-Agent can be customized here if needed, but defaults to Chrome
        # user_agent: "Mozilla/5.0 ..."

        # Semantic Auth Detection (Optional)
        # Uses LLM to check for "Access Denied" messages even on 200 OK pages
        semantic_auth_detection: true
        semantic_auth_model: "ollama/qwen3:4b-instruct-2507-q4_K_M"
        # max_semantic_check_length: 500  # Default is 500 chars

  # Domain-to-spider routing
  domain_routing:
    exact:
      "nxcals-docs.web.cern.ch": docs
      "acc-py.web.cern.ch": docs
      "admin-eguide.web.cern.ch": drupal
      "beams.cern": drupal
      "home.cern": drupal
      "confluence.cern.ch": generic
      "guides.web.cern.ch": drupal

    patterns:
      - pattern: ".*-docs\\.web\\.cern\\.ch"
        spider: docs
      - pattern: ".*\\.docs\\.cern\\.ch"
        spider: docs
      - pattern: ".*wiki.*"
        spider: generic
      - pattern: ".*\\.cern$"
        spider: drupal

    default: generic

  # Spider-specific settings
  spider_settings:
    docs:
      skip_versions: true
      version_allowlist: [stable, latest, current, main, master]
      # deny_patterns has defaults for Sphinx/RTD sites:
      # - /_sources/ (raw RST files)
      # - \.rst\.txt$ (RST source downloads)
      # - /genindex\.html$, /py-modindex\.html$, /search\.html$
      # - /_modules/ (auto-generated API pages)
      # Uncomment to customize:
      # deny_patterns:
      #   - "/_sources/"
      #   - "\\.rst\\.txt$"

    # drupal:
    #   deny_patterns:
    #     - "/node/\\d+"  # Skip Drupal node IDs (default)

    # generic:
    #   deny_patterns: []
