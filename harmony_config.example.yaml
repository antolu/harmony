# Harmony Crawler Configuration Example

crawler:
  # Starting URLs for the crawl
  start_urls:
    - "https://nxcals-docs.web.cern.ch/current"
    - "https://acc-py.docs.cern.ch"
    - https://beams.cern
    - https:///home.cern
    - "https://admin-eguide.web.cern.ch"

  # Proxy configuration (optional)
  # proxy:
  #   # Proxy URL (scheme determines type: http://, https://, socks4://, socks5://)
  #   url: http://proxy.example.com:8080
  #   # Authentication (optional)
  #   username: myuser
  #   password: mypass
  #   # Example SOCKS5 proxy:
  #   # url: socks5://127.0.0.1:1080

  # State management (optional - enables stateful crawling)
  # Requires Elasticsearch running
  # es_state_host: http://localhost:9200
  # es_state_index: harmony-crawl-state

  # Pause/resume support (works with or without state tracking)
  # jobdir: .crawl-state

  # Re-crawling mode (requires state tracking)
  # recrawl_mode: full  # or "age-based"
  # max_age_days: 7  # Only for age-based mode

  # Deletion management (requires state tracking)
  # delete_missing: false  # Set to true to auto-delete
  # missing_threshold: 3  # Number of crawls before deletion

  # Safety configuration (defaults shown, all commented out)
  # Safety is enabled by default - uncomment only to change behavior
  # safe_mode: false  # Set true for extra strict checks (blocks URLs with id= + action words)
  # dry_run: false  # Set true to test without making requests
  # allow_mutations: false  # Set true to reduce safety - USE WITH EXTREME CAUTION
  # ignore_robots: false  # Set true to ignore robots.txt - not recommended

  # Interactive safety: prompt to approve/deny blocked URLs
  # interactive_safety: false  # Set true to enable prompts (only works in TTY)

  # Custom allow/deny lists (regex patterns)
  # safety_allow_list:
  #   - "example\\.com/admin/view.*"  # Allow specific admin view pages
  #   - "docs\\.example\\.com/.*"     # Allow entire docs subdomain

  # safety_deny_list:
  #   - "/private/.*"                 # Block all private paths
  #   - ".*\\?debug=.*"               # Block URLs with debug param

  # Persistent safety lists file (auto-saved when using interactive_safety)
  # safety_lists_file: .harmony-safety-lists.json

  # Authentication configuration (optional)
  # Supports multiple authentication methods for protected sites
  # auth:
  #   # Session storage path
  #   session_storage_path: .harmony-auth-sessions
  #
  #   # Retry settings for failed authentication
  #   max_auth_retries: 3
  #   auth_retry_delay: 5.0
  #
  #   # Authentication providers (multiple supported)
  #   providers:
  #     # Static cookie authentication (simplest, for pre-obtained cookies)
  #     - type: static_cookie
  #       domain_patterns:
  #         - "protected\\.example\\.com"
  #       cookies:
  #         session_id: "abc123xyz"
  #         auth_token: "secret_token"
  #
  #     # HTTP Basic Authentication
  #     - type: basic
  #       domain_patterns:
  #         - "api\\.example\\.com"
  #       username: "myuser"
  #       password: "mypassword"
  #
  #     # Bearer token authentication (OAuth2 Access Token)
  #     - type: bearer
  #       domain_patterns:
  #         - "api\\.example\\.com/v2/.*"
  #       token: "eyJhbGciOiJIUzI1..."
  #
  #     # OAuth2 Client Credentials (Service Account)
  #     - type: service_account
  #       domain_patterns:
  #         - "api\\.example\\.com"
  #       token_url: "https://auth.example.com/oauth/token"
  #       client_id: "service_account_id"
  #       client_secret: "service_account_secret"
  #       scopes:
  #         - "read:data"
  #         - "write:data"
  #
  #     # Interactive SSO with Playwright (for sites with 2FA, SAML, etc.)
  #     # Requires: pip install harmony[browser]
  #     # Then run: playwright install chromium
  #     - type: playwright_sso
  #       domain_patterns:
  #         - "sso\\.example\\.com"
  #         - ".*\\.internal\\.company\\.com"
  #       login_url: "https://sso.example.com/login"
  #       # Playwright will open browser for manual login
  #       # Sessions are saved for reuse
  #       # Authentication required indicators (optional)
  #       auth_required_url_patterns:
  #         - ".*/login.*"
  #         - ".*/auth.*"

  # Domain-to-spider routing
  domain_routing:
    # Exact domain matches (highest priority)
    exact:
      "nxcals-docs.web.cern.ch": docs
      "admin-eguide.web.cern.ch": drupal
      "beams.cern": drupal
      "home.cern": drupal
      "confluence.cern.ch": generic

    # Pattern-based matches (checked in order after exact matches)
    patterns:
      - pattern: ".*-docs\\.web\\.cern\\.ch"
        spider: docs
      - pattern: ".*\\.docs\\.cern\\.ch"
        spider: docs
      - pattern: ".*wiki.*"
        spider: generic
      - pattern: ".*\\.cern$"
        spider: drupal

    # Default spider for domains that don't match any rules
    default: generic

  # Spider-specific settings
  spider_settings:
    # Documentation spider settings
    docs:
      skip_versions: true
      version_allowlist:
        - stable
        - latest
        - current
        - main
        - master
        - dev
        - beta
        - nightly
