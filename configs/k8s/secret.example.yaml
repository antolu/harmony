# Copy to secret.yaml, fill in real values, and DO NOT commit the filled copy.
# Create from this template with:
#   kubectl create secret generic harmony-secrets -n harmony \
#     --from-literal=DATABASE_PASSWORD=... --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: harmony-secrets
  namespace: harmony
type: Opaque
stringData:
  DATABASE_PASSWORD: "CHANGE_ME"
  HARMONY_INTERNAL_TOKEN: "CHANGE_ME"
  # OIDC / SSO (if AUTH_MODE requires it)
  OIDC_CLIENT_ID: "CHANGE_ME"
  OIDC_CLIENT_SECRET: "CHANGE_ME"
  # Encryption key for stored API keys / secrets
  SECRET_ENCRYPTION_KEY: "CHANGE_ME"
