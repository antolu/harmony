# CPU-based autoscaling for the stateless API and frontend. GPU/model-serving
# autoscaling needs a custom metric (queue depth / p95) — see docs/SCALING.md.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: harmony-api
  namespace: harmony
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: harmony-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: harmony-app
  namespace: harmony
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: harmony-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
