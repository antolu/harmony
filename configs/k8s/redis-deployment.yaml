# Redis holds rate-limit counters, the shared document cache, and session/JTI
# state. A single replica with a small PVC is fine for the reference cluster;
# use a managed/HA Redis for production resilience.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: harmony
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: harmony
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: harmony
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
