services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
    container_name: harmony-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx2048m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: harmony-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.1
    container_name: harmony-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama
    container_name: harmony-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '{ printf >&3 \"GET / HTTP/1.0\\r\\n\\r\\n\"; cat <&3; } 3<>/dev/tcp/localhost/11434 | grep \"Ollama is\" || exit 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  harmony-api:
    build: .
    container_name: harmony-api
    ports:
      - "8000:8000"
    environment:
      - ES_CONFIG_FILE=/app/es_config.yaml
      - ES_HOST=http://elasticsearch:9200
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-3-flash-preview}
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./es_config.yaml:/app/es_config.yaml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: harmony-pipelines
    ports:
      - "9099:9099"
    volumes:
      - ./openwebui_pipelines:/app/pipelines
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.6.43
    container_name: harmony-openwebui
    ports:
      - "3000:8080"
    environment:
      - WEBUI_AUTH=false
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE_URLS=http://pipelines:9099
      - OPENAI_API_KEYS=0p3n-w3bu!
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - harmony-api
      - pipelines
    restart: unless-stopped

volumes:
  es_data:
    driver: local
  openwebui_data:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local
