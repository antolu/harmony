services:
  postgres:
    image: postgres:17-alpine
    container_name: harmony-postgres
    environment:
      - POSTGRES_USER=harmony
      - POSTGRES_PASSWORD=harmony
      - POSTGRES_DB=harmony
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmony -d harmony"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: harmony-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
    container_name: harmony-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx2048m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: harmony-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.1
    container_name: harmony-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama
    container_name: harmony-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '{ printf >&3 \"GET / HTTP/1.0\\r\\n\\r\\n\"; cat <&3; } 3<>/dev/tcp/localhost/11434 | grep \"Ollama is\" || exit 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  harmony-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: production
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: harmony-frontend
    ports:
      - "8080:80"
    depends_on:
      - harmony-api
    restart: unless-stopped

  harmony-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        BUILD_TYPE: production
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: harmony-api
    environment:
      - ES_CONFIG_FILE=/app/es_config.yaml
      - ES_HOST=http://elasticsearch:9200
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-3-flash-preview}
      - OLLAMA_HOST=http://ollama:11434
      - CORS_ALLOWED_ORIGINS=http://localhost:8080
      - ADMIN_ES_HOST=http://elasticsearch:9200
      - ADMIN_CONFIG_STORAGE_PATH=/data/configs
      - ADMIN_JOB_LOG_PATH=/data/logs
      - ADMIN_CRAWLER_OUTPUT_PATH=/crawl-output
      - ADMIN_NOVNC_URL=http://localhost:6080
      - DATABASE_URL=postgresql://harmony:harmony@postgres:5432/harmony
      - REDIS_URL=redis://redis:6379/0
      - HARMONY_BACKEND_URL=http://localhost:8000
    volumes:
      - ./configs/es_config.yaml:/app/es_config.yaml:ro
      - admin_data:/data
      - ./output:/crawl-output
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn harmony.api.main:app --host 0.0.0.0 --port 8000"]

  # Optional: noVNC for SSO authentication (start with --profile sso)
  sso-browser:
    build:
      context: ./docker/sso-browser
    container_name: harmony-sso-browser
    profiles:
      - sso
    volumes:
      - sso_sessions:/sessions

  novnc:
    image: theasp/novnc:latest
    container_name: harmony-novnc
    environment:
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=800
      - VNC_HOST=sso-browser
      - VNC_PORT=5900
    ports:
      - "6080:8080"
    profiles:
      - sso
    depends_on:
      - sso-browser


volumes:
  es_data:
    driver: local
  admin_data:
    driver: local
  pg_data:
    driver: local
  sso_sessions:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local
