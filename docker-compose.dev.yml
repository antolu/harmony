# Development environment with live reload
# Usage: ./dev.sh start

services:
  postgres:
    image: postgres:18-alpine
    container_name: harmony-postgres
    environment:
      - POSTGRES_USER=harmony
      - POSTGRES_PASSWORD=harmony
      - POSTGRES_DB=harmony
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmony -d harmony"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:8-alpine
    container_name: harmony-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
    container_name: harmony-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx2048m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: harmony-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: keycloak/keycloak:26.6.1
    container_name: harmony-keycloak
    command: start-dev --import-realm
    volumes:
      - ./keycloak/harmony-realm.json:/opt/keycloak/data/import/harmony-realm.json:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/harmony
      KC_DB_USERNAME: harmony
      KC_DB_PASSWORD: harmony
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "9092:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: http://localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BUILD_TYPE: development
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: harmony-api
    volumes:
      # Mount source code for live reload
      - ./harmony:/app/harmony
      - ./admin-frontend:/app/admin-frontend
      - ./pyproject.toml:/app/pyproject.toml
      - ./README.md:/app/README.md
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      # Dev mode: mount local directories for easy access
      - ./.dev-data:/data
      - ./output:/crawl-output
      # Preserve Python cache
      - /app/harmony/__pycache__
    environment:
      - ADMIN_ES_HOST=http://elasticsearch:9200
      - ADMIN_CONFIG_STORAGE_PATH=/data/configs
      - ADMIN_JOB_LOG_PATH=/data/logs
      - ADMIN_CRAWLER_OUTPUT_PATH=/crawl-output
      - ADMIN_NOVNC_URL=http://localhost:6080
      - ES_HOST=http://elasticsearch:9200
      - DATABASE_URL=postgresql://harmony:harmony@postgres:5432/harmony
      - REDIS_URL=redis://redis:6379/0
      - HARMONY_BACKEND_URL=http://localhost:8000
      - QDRANT_HOST=http://qdrant:6333
      - OLLAMA_HOST=http://host.docker.internal:11434
      - CORS_ALLOWED_ORIGINS=http://localhost:3001,http://localhost:8080
      # Public URL of Harmony itself — used to build the OIDC callback URI
      - HARMONY_PUBLIC_URL=${HARMONY_PUBLIC_URL:-http://localhost:8080}
      # OIDC / Auth — Keycloak dev instance
      # Internal URL for API↔Keycloak calls; public browser URL is proxied via Vite (/realms → keycloak:8080)
      - OIDC_ISSUER_URL=http://localhost:8080/realms/harmony
      - OIDC_INTERNAL_URL=http://keycloak:8080/realms/harmony
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-harmony}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-dev-client-secret}
      - AUTH_MODE=${AUTH_MODE:-optional}
      - HARMONY_SECURE_COOKIES=false
    expose:
      - "8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    command:
      - "sh"
      - "-c"
      - "alembic upgrade head && exec uvicorn harmony.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/harmony"

  frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: development
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: harmony-frontend
    volumes:
      # Mount source code for live reload
      - ./admin-frontend:/app
      # Preserve node_modules and cache
      - /app/node_modules
      - /app/.vite
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - API_PROXY_URL=http://api:8000
      - VITE_API_URL=
    ports:
      - "8080:3001"
    depends_on:
      - api
    command:
      - "npm"
      - "run"
      - "dev"
      - "--"
      - "--host"
      - "0.0.0.0"

volumes:
  es_data:
    driver: local
  pg_data:
    driver: local
  qdrant_data:
    driver: local
