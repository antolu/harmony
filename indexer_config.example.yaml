# Harmony Indexer Configuration Example
# Usage: harmony-index --config indexer_config.example.yaml

# Directory containing crawled content
data_dir: "output"

# Source of metadata: "disk" (metadata.jsonl) or "elasticsearch" (crawl state)
source: "elasticsearch"

# Elasticsearch settings
es_config: "es_config.yaml"
# es_host: "http://localhost:9200"  # Ignored if es_config is set
# index_base_name: "harmony"        # Ignored if es_config is set

# State index for deletion sync and source="elasticsearch"
# Uses ES_STATE_INDEX env var (default: harmony-crawl-state)

# Sync deletions from crawl state to content index
sync_deletions: true
missing_threshold: 3

# Performance settings
batch_size: 100
verbose: 0
