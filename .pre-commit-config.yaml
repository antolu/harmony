exclude: ^(.idea/|.vscode)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: ["--unsafe"]
      - id: debug-statements
        exclude: ^LICENSE|\.(html|csv|txt|svg|py)$
      - id: pretty-format-json
        args: ["--autofix", "--no-ensure-ascii", "--no-sort-keys"]
        exclude: ^frontend/
      - id: requirements-txt-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: \.(html|svg)$
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.15.19"
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --preview, --unsafe-fixes]
        exclude: "^docs/source/conf.py$"
      - id: ruff-format
        exclude: "^docs/source/conf.py$"
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v2.0.0"
    hooks:
      - id: mypy
        exclude: ^alembic/
        additional_dependencies:
          - "numpy>=1.21, <2"
          - "types-PyYAML"

  # ESLint for TypeScript/JavaScript linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.36.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        exclude: ^frontend/(node_modules|dist|build|coverage|\.next|\.nuxt|\.vite)/
        types: [file]
        args: [--fix, --config, frontend/eslint.config.js]
        additional_dependencies:
          - eslint@9.33.0
          - '@eslint/js@9.33.0'
          - 'typescript-eslint@8.62.0'
          - 'eslint-plugin-react-hooks@5.2.0'
          - 'eslint-plugin-react-refresh@0.4.20'
          - 'globals@16.3.0'
          - 'typescript@5.8.3'

  # Prettier for code formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|scss|md|yaml|yml)$
        exclude: ^frontend/(dist|build|coverage|node_modules)/

  # Docker linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
