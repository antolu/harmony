services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
    container_name: harmony-test-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1024m"  # Increased memory for stability
    ports:
      - "9200:9200"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: harmony-test-qdrant
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  harmony-api:
    build: .
    container_name: harmony-test-api
    ports:
      - "8000:8000"
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_INDEX_BASE_NAME=harmony
      - ES_LANGUAGES=["en"]
      - LLM_MODEL=none # Use "none" instead of null
      - QDRANT_HOST=http://qdrant:6333
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: harmony-test-pipelines
    ports:
      - "9099:9099"
    volumes:
      - ./openwebui_pipelines:/app/pipelines
    environment:
      - HARMONY_API_URL=http://harmony-api:8000
    depends_on:
      harmony-api:
        condition: service_healthy
