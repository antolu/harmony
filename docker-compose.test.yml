services:
  postgres:
    image: postgres:17-alpine
    container_name: harmony-test-postgres
    environment:
      - POSTGRES_USER=harmony
      - POSTGRES_PASSWORD=harmony
      - POSTGRES_DB=harmony
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmony -d harmony"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: harmony-test-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
    container_name: harmony-test-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1024m"  # Increased memory for stability
    ports:
      - "9200:9200"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: harmony-test-qdrant
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  harmony-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BUILD_TYPE: production
    container_name: harmony-test-api
    ports:
      - "8000:8000"
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_INDEX_BASE_NAME=harmony
      - ES_LANGUAGES=["en"]
      - LLM_MODEL=none # Use "none" instead of null
      - QDRANT_HOST=http://qdrant:6333
      - DATABASE_URL=postgresql://harmony:harmony@postgres:5432/harmony
      - REDIS_URL=redis://redis:6379/0
      - HARMONY_BACKEND_URL=http://localhost:8000
      - CORS_ALLOWED_ORIGINS=http://localhost:8080
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn harmony.api.main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: harmony-test-pipelines
    ports:
      - "9099:9099"
    volumes:
      - ./openwebui_pipelines:/app/pipelines
    environment:
      - HARMONY_API_URL=http://harmony-api:8000
    depends_on:
      harmony-api:
        condition: service_healthy
